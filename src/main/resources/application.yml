server:
  port: 8082

spring:
  application:
    name: edgecloud-monitoring-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/monitoring_db}
    username: ${SPRING_DATASOURCE_USERNAME:monitoring_user}
    password: ${SPRING_DATASOURCE_PASSWORD:monitoring_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always